name: Triggers
options:
  bundleIdPrefix: com.manumedev
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Triggers:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: triggers
    resources:
      - path: triggers/Resources
    dependencies:
      - sdk: NetworkExtension.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.manumedev.triggers
        INFOPLIST_FILE: triggers/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: triggers/Resources/Triggers.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": triggers/Resources/Triggers-Simulator.entitlements
